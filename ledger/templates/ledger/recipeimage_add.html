{% extends "base.html" %}

{% block page_title %}
Add Recipe Image
{% endblock %}

{% block content %}
    <h2>Add Image for {{ recipe.title }}</h2>
    <form method = "POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
{% endblock %}
