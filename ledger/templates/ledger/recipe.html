{% extends "base.html" %}

{% block content %}
    <h2> {{ recipe.name }} </h2>
    <h2> Author: {{ recipe.author.name }} </h2>
    <ul>
        {% for ingredient in recipe.ingredients.all %}
            <li> 
                {{ ingredient.ingredient.name }} - {{ ingredient.quantity }}
            </li>
        {% endfor %}
    </ul>

    <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Logout</button>
    </form>
{% endblock %}
