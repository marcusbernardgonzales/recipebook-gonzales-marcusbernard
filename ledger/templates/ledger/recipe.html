{% extends "base.html" %}

{% block page_title %}
{{ recipe.name }}
{% endblock %}

{% block content %}
    <h2> Author: {{ recipe.author.name }} </h2>
    <ul>
        {% for ingredient in recipe.ingredients.all %}
            <li> 
                {{ ingredient.ingredient.name }} - {{ ingredient.quantity }}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
