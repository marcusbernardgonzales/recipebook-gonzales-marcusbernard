{% extends "base.html" %}

{% block page_title %}
Recipe List
{% endblock %}

{% block content %}
    {% if user.is_authenticated %}
    <a href="{% url 'recipes:recipe_add' %}">Add Recipe</a>
    {% endif %}
    <ul>
        {% for recipe in recipes %}
            <li> 
                <a href="{{ recipe.get_absolute_url }}"> {{ recipe.name }} </a> 
            </li>
        {% endfor %}
    </ul>
{% endblock %}
